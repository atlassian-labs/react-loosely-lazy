<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00B8D9;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0052CC;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Flowing wave representing smooth lazy loading -->
  <path d="M 20 60 Q 40 30, 60 60 T 100 60" 
        fill="none" 
        stroke="url(#flowGradient)" 
        stroke-width="8" 
        stroke-linecap="round"/>
  
  <!-- Secondary flow line -->
  <path d="M 20 75 Q 40 45, 60 75 T 100 75" 
        fill="none" 
        stroke="#00B8D9" 
        stroke-width="4" 
        stroke-linecap="round" 
        opacity="0.6"/>
  
  <!-- Tertiary flow line -->
  <path d="M 20 45 Q 40 15, 60 45 T 100 45" 
        fill="none" 
        stroke="#0052CC" 
        stroke-width="2" 
        stroke-linecap="round" 
        opacity="0.3"/>
  
  <!-- Loading indicators at different phases -->
  <circle cx="30" cy="60" r="4" fill="#0052CC">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="60" r="4" fill="#00B8D9">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.7s"/>
  </circle>
  <circle cx="90" cy="60" r="4" fill="#0052CC" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite" begin="1.4s"/>
  </circle>
  
  <!-- Central performance indicator -->
  <rect x="56" y="56" width="8" height="8" rx="2" fill="#FFFFFF" stroke="#0052CC" stroke-width="1"/>
</svg>