<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer container -->
  <rect x="20" y="20" width="80" height="80" rx="8" fill="none" stroke="#E3E8F0" stroke-width="2"/>
  
  <!-- Progressive loading bars representing lazy loading -->
  <rect x="30" y="35" width="60" height="8" rx="4" fill="#0052CC"/>
  <rect x="30" y="50" width="45" height="8" rx="4" fill="#0052CC" opacity="0.7"/>
  <rect x="30" y="65" width="30" height="8" rx="4" fill="#0052CC" opacity="0.4"/>
  <rect x="30" y="80" width="15" height="8" rx="4" fill="#00B8D9" opacity="0.3"/>
  
  <!-- Loading indicator dots -->
  <circle cx="75" cy="84" r="2" fill="#FF5630"/>
  <circle cx="82" cy="84" r="2" fill="#FF5630" opacity="0.6"/>
  <circle cx="89" cy="84" r="2" fill="#FF5630" opacity="0.3"/>
  
  <!-- React-style component brackets -->
  <path d="M 15 45 L 10 45 L 10 75 L 15 75" stroke="#0052CC" stroke-width="2" fill="none"/>
  <path d="M 105 45 L 110 45 L 110 75 L 105 75" stroke="#0052CC" stroke-width="2" fill="none"/>
</svg>