[package]
name = "react-loosely-lazy-swc"
version = "1.0.0"
edition = "2021"
authors = ["SWC Plugin Author"]
license = "MIT"
description = "SWC plugin that replicates @atlassian-labs/react-loosely-lazy functionality with identical behavior"
repository = "https://github.com/atlassian-labs/react-loosely-lazy-swc"
homepage = "https://github.com/atlassian-labs/react-loosely-lazy-swc"
keywords = ["swc", "react", "lazy", "code-splitting", "ssr"]
categories = ["development-tools", "web-programming"]
readme = "README.md"

[lib]
crate-type = ["cdylib"]

[dependencies]
swc_core = { version = "0.96", features = [
  "ecma_plugin_transform",
  "ecma_utils",
  "ecma_visit",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
path-clean = "1.0"
pathdiff = "0.2"

[dev-dependencies]
swc_core = { version = "0.96", features = [
  "testing_transform",
  "__parser",
  "ecma_parser",
] }
