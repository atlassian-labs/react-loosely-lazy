<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#e2e8f0" stroke-width="2" opacity="0.3"/>
  
  <!-- Phase 1: PAINT - Solid circle -->
  <circle cx="35" cy="60" r="12" fill="#2563eb">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  
  <!-- Phase 2: AFTER_PAINT - Semi-transparent circle -->
  <circle cx="60" cy="60" r="12" fill="#7c3aed" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.7s"/>
  </circle>
  
  <!-- Phase 3: LAZY - Outline circle -->
  <circle cx="85" cy="60" r="12" fill="none" stroke="#64748b" stroke-width="2">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1.4s"/>
  </circle>
  
  <!-- Connecting lines showing progression -->
  <line x1="47" y1="60" x2="48" y2="60" stroke="#e2e8f0" stroke-width="2" opacity="0.5"/>
  <line x1="72" y1="60" x2="73" y2="60" stroke="#e2e8f0" stroke-width="2" opacity="0.5"/>
</svg>