<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (Initial phase) -->
  <circle cx="60" cy="60" r="50" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2" opacity="0.6"/>
  
  <!-- Paint phase circle -->
  <circle cx="60" cy="60" r="35" fill="#4285f4" opacity="0.8"/>
  
  <!-- After paint phase circle -->
  <circle cx="60" cy="60" r="22" fill="#34a853" opacity="0.9"/>
  
  <!-- Lazy phase circle -->
  <circle cx="60" cy="60" r="12" fill="#fbbc04"/>
  
  <!-- Central dot representing the core -->
  <circle cx="60" cy="60" r="4" fill="#ea4335"/>
</svg>