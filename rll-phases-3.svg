<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="react-loosely-lazy logo - lazy layers">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#57D9A3"/>
      <stop offset="100%" stop-color="#00875A"/>
    </linearGradient>
  </defs>
  <!-- Stacked cards representing deferred layers with a reveal cut (limited palette) -->
  <rect x="22" y="28" width="84" height="72" rx="14" fill="#57D9A3" opacity="0.25"/>
  <rect x="18" y="24" width="84" height="72" rx="14" fill="#57D9A3" opacity="0.55"/>
  <rect x="14" y="20" width="84" height="72" rx="14" fill="url(#g3)"/>
  <!-- Lazy "bite" using negative space triangle -->
  <polygon points="86,20 128,20 86,62" fill="#fff"/>
</svg>
