<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#E3E8F0" stroke-width="2"/>
  
  <!-- Phase 1: PAINT - Solid circle (immediate) -->
  <circle cx="60" cy="35" r="12" fill="#0052CC"/>
  
  <!-- Phase 2: AFTER_PAINT - Semi-transparent circle (delayed) -->
  <circle cx="45" cy="70" r="12" fill="#0052CC" opacity="0.6"/>
  
  <!-- Phase 3: LAZY - Outline circle (deferred) -->
  <circle cx="75" cy="70" r="12" fill="none" stroke="#0052CC" stroke-width="2"/>
  
  <!-- Connecting lines showing progression -->
  <path d="M 60 47 L 45 58" stroke="#00B8D9" stroke-width="2" opacity="0.7"/>
  <path d="M 57 58 L 75 58" stroke="#00B8D9" stroke-width="2" opacity="0.7"/>
  
  <!-- Central dot representing React component -->
  <circle cx="60" cy="60" r="3" fill="#FF5630"/>
</svg>